# Template de Secret Kubernetes pour la configuration Albert (S1.4).
#
# NE JAMAIS renseigner une vraie clé dans ce fichier versionné. Deux usages :
#   1. copier hors repo, compléter, puis `kubectl apply -f <copie>` ;
#   2. ou créer directement sans fichier :
#        kubectl create secret generic sia-albert \
#          --from-literal=ALBERT_BASE_URL=https://albert.api.etalab.gouv.fr/v1 \
#          --from-literal=ALBERT_API_KEY=<clé>
# Consommation prévue (S1.6, chart Helm) : `envFrom.secretRef` sur le conteneur api.
apiVersion: v1
kind: Secret
metadata:
  name: sia-albert
type: Opaque
stringData:
  ALBERT_BASE_URL: https://albert.api.etalab.gouv.fr/v1
  ALBERT_API_KEY: "" # à renseigner hors repo — jamais commité
  # Alias de modèles : surcharger seulement si besoin, les défauts vivent dans le code.
  # ALBERT_MODEL_CHAT: openweight-medium
  # ALBERT_MODEL_EMBEDDINGS: openweight-embeddings
  # ALBERT_MODEL_RERANK: openweight-rerank
