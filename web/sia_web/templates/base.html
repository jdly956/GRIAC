<!doctype html>
<html lang="fr" data-fr-scheme="system">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block titre %}SIA PO{% endblock %} — assistant de rédaction de user stories</title>
  <!-- DSFR par CDN au MVP (à vendorer pour la prod, E7) ; styles de repli locaux ci-dessous. -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@gouvfr/dsfr@1.12/dist/dsfr.min.css">
  <!-- S3.8 : htmx vendoré — progressive enhancement : sans JavaScript, les
       formulaires classiques restent pleinement fonctionnels. -->
  <script src="{{ racine }}/static/htmx.min.js" defer></script>
  <style>
    body { font-family: Marianne, arial, sans-serif; margin: 0; }
    .conteneur { max-width: 60rem; margin: 0 auto; padding: 1rem; }
    .fil-message { border: 1px solid #ddd; border-radius: .25rem; padding: .75rem; margin: .5rem 0; white-space: pre-wrap; }
    .fil-po { background: #f5f5fe; }
    .fil-assistant { background: #fff; }
    /* S3.6 : contenu assistant rendu en HTML — le pre-wrap du fil ne s'applique
       plus (les sauts de ligne sont portés par le rendu), tableaux lisibles et
       défilables horizontalement si trop larges. */
    .contenu-md { white-space: normal; overflow-x: auto; }
    .contenu-md table { border-collapse: collapse; margin: .5rem 0; }
    .contenu-md th, .contenu-md td { border: 1px solid #bbb; padding: .25rem .5rem; text-align: left; vertical-align: top; }
    .contenu-md th { background: #f5f5fe; }
    .contenu-md h1, .contenu-md h2, .contenu-md h3, .contenu-md h4 { font-size: 1.05rem; margin: .75rem 0 .25rem; }
    .contenu-md p { margin: .35rem 0; }
    .panneau { border: 1px solid #ccc; border-radius: .25rem; padding: .75rem; margin: 1rem 0; }
    textarea { width: 100%; }
    /* S3.7 : blocs repliables (registre, échanges précédents, notation). */
    details.panneau > summary { cursor: pointer; }
    .action-secondaire { border-top: 1px solid #ddd; margin-top: .75rem; padding-top: .75rem; }
    /* S3.8 : indicateur de génération (htmx pilote .htmx-indicator via la
       classe htmx-request posée sur le formulaire en cours d'appel). */
    .htmx-indicator { display: none; font-weight: bold; }
    .htmx-request .htmx-indicator { display: inline-block; }
    .htmx-request button[type], .htmx-request button { cursor: wait; }
    /* S3.11 : jauge de consommation quotidienne vs quota tpd. */
    .jauge { background: #eee; border-radius: .25rem; height: .75rem; overflow: hidden; }
    .jauge-remplie { background: #000091; height: 100%; }
  </style>
</head>
<body>
  <header role="banner" class="fr-header">
    <div class="conteneur">
      <p><a href="{{ racine }}/" title="Accueil">🏛️ <strong>SIA PO</strong></a> — assistant de rédaction de user stories</p>
      <nav role="navigation" aria-label="Menu principal">
        <a href="{{ racine }}/">Sessions</a> · <a href="{{ racine }}/projets">Projets</a> · <a href="{{ racine }}/documents">Mes documents</a> · <a href="{{ racine }}/telemetrie">Télémétrie</a> · <a href="{{ racine }}/parametres">Paramètres</a>
      </nav>
      <div class="fr-alert fr-alert--warning" role="alert">
        <p><strong>⚠️ Ne collez pas de données personnelles.</strong> Données publiques ou internes non sensibles uniquement.</p>
      </div>
    </div>
  </header>
  <main role="main" class="conteneur">
    {% block contenu %}{% endblock %}
  </main>
</body>
</html>
